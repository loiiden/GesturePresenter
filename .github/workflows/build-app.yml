name: Build desktop application

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install application and builder
        run: python -m pip install ".[voice,build]"
      - name: Build native application
        run: pyinstaller --clean --noconfirm GesturePresenter.spec

      - name: Create macOS DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist/dmg
          cp -R "dist/Gesture Presenter.app" dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create -size 300m -fs HFS+ -volname "Gesture Presenter" -srcfolder dist/dmg -ov -format UDZO "dist/Gesture-Presenter-macOS.dmg"

      - name: Create Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: iscc packaging/windows/GesturePresenter.iss

      - name: Create Linux AppImage layout
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/512x512/apps
          cp dist/GesturePresenter AppDir/usr/bin/
          cp packaging/linux/AppRun AppDir/AppRun
          chmod +x AppDir/AppRun AppDir/usr/bin/GesturePresenter
          cp packaging/linux/GesturePresenter.desktop AppDir/GesturePresenter.desktop
          cp packaging/linux/GesturePresenter.desktop AppDir/usr/share/applications/
          cp assets/icon-512.png AppDir/gesture-presenter.png
          cp assets/icon-512.png AppDir/usr/share/icons/hicolor/512x512/apps/gesture-presenter.png
          curl -L -o appimagetool.AppImage https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage
          ./appimagetool.AppImage --appimage-extract
          ARCH=x86_64 ./squashfs-root/AppRun AppDir "dist/Gesture-Presenter-Linux-x86_64.AppImage"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GesturePresenter-${{ runner.os }}
          path: |
            dist/Gesture-Presenter-macOS.dmg
            dist/Gesture-Presenter-Windows-Setup.exe
            dist/Gesture-Presenter-Linux-x86_64.AppImage
          if-no-files-found: error

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Gesture-Presenter-macOS.dmg
            dist/Gesture-Presenter-Windows-Setup.exe
            dist/Gesture-Presenter-Linux-x86_64.AppImage

  # Ship the freshly built installers to the download server (VPS) and refresh
  # the latest.json manifest the landing site reads. Runs only for tag builds.
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Collect all installers
        uses: actions/download-artifact@v4
        with:
          path: staging
          pattern: GesturePresenter-*
          merge-multiple: true

      - name: Generate latest.json manifest
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME#v}"
          cd staging
          # Flatten any accidental subdirectories so every installer sits at the
          # top level and is served from /latest/<file> with no path prefix.
          find . -mindepth 2 -type f -exec mv -t . {} +
          mac="Gesture-Presenter-macOS.dmg"
          win="Gesture-Presenter-Windows-Setup.exe"
          lin="Gesture-Presenter-Linux-x86_64.AppImage"
          entry() { printf '{"name":"%s","size":%s,"sha256":"%s"}' \
            "$1" "$(stat -c%s "$1")" "$(sha256sum "$1" | cut -d' ' -f1)"; }
          {
            printf '{\n  "version": "%s",\n  "files": {\n' "$VER"
            printf '    "mac": %s,\n'     "$(entry "$mac")"
            printf '    "windows": %s,\n' "$(entry "$win")"
            printf '    "linux": %s\n'    "$(entry "$lin")"
            printf '  }\n}\n'
          } > latest.json
          echo "----- latest.json -----"; cat latest.json

      - name: Add SSH deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Upload to download server
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}   # e.g. 203.0.113.10 or vps.example.com
          USER: ${{ secrets.DEPLOY_USER }}   # e.g. deploy
          BASE: ${{ secrets.DEPLOY_PATH }}   # e.g. /var/www/downloads
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME#v}"
          mkdir -p ~/.ssh
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          # Versioned copy (kept forever) and the "latest" copy the site links to.
          ssh "$USER@$HOST" "mkdir -p '$BASE/$VER' '$BASE/latest'"
          rsync -avz --exclude latest.json staging/ "$USER@$HOST:$BASE/$VER/"
          rsync -avz --exclude latest.json staging/ "$USER@$HOST:$BASE/latest/"
          # Manifest last, so the version only flips once the files are in place.
          scp staging/latest.json "$USER@$HOST:$BASE/latest.json"
