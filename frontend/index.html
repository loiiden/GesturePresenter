<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gesture Presenter</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <header>
      <h1>Gesture Presenter</h1>
      <span id="statusBadge" class="badge"><i></i><span>Ready</span></span>
    </header>

    <section class="layout">
      <aside class="settings card">
        <div class="section-title"><span>Setup</span><button id="refreshDevices" class="text-button">Refresh</button></div>

        <label>Camera<select id="camera"></select></label>
        <label>Display<select id="display"></select></label>

        <label id="voiceRow" class="toggle-row"><span><b>Voice transcription</b><small id="voiceHint">Runs locally with Whisper</small></span><input id="voice" type="checkbox"><i></i></label>

        <div class="gesture-help">
          <h3>Quick controls</h3>
          <p>Point to move · pinch to click</p>
          <p>Two fingers to scroll</p>
          <p>Open-palm swipe to change slides</p>
        </div>
      </aside>

      <section class="stage card">
        <div id="emptyState" class="empty-state"><div class="camera-icon"></div></div>
        <img id="preview" alt="Live gesture preview">
        <div id="error" class="error" hidden></div>
        <div class="stage-footer"><span id="statusText">Camera is off</span><span class="privacy">● Local processing</span></div>
      </section>
    </section>

    <footer>
      <button id="startButton" class="primary" disabled>Loading…</button>
    </footer>
  </main>
  <script src="app.js"></script>
</body>
</html>
